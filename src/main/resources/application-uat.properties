spring.application.name=${SPRING_APPLICATION_NAME:cloudflows}
server.port=${SERVER_PORT:9000}
application.environment=${APPLICATION_ENVIRONMENT:uat}

# Database Configuration
spring.datasource.url=${DB_URL}?sslmode=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS_NAME:org.postgresql.Driver}

# Hibernate default schema
spring.jpa.properties.hibernate.default_schema=${DB_DEFAULT_SCHEMA:public}

# Disable Hibernate connection pool logging
logging.level.org.hibernate.orm.connections.pooling=${LOGGING_LEVEL_HIBERNATE_POOLING:WARN}
logging.level.org.hibernate.engine.jdbc.connections.internal=${LOGGING_LEVEL_JDBC_INTERNAL:WARN}

# Hibernate/JPA Properties
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:false}
spring.jpa.properties.hibernate.use_sql_comments=${JPA_USE_SQL_COMMENTS:false}
spring.jpa.properties.hibernate.jdbc.time_zone=${JPA_JDBC_TIMEZONE:Asia/Kolkata}

# Enable Hibernate DDL logging
logging.level.org.hibernate.SQL=${LOGGING_LEVEL_HIBERNATE_SQL:WARN}
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${LOGGING_LEVEL_BASIC_BINDER:WARN}
logging.level.org.hibernate.tool.schema=${LOGGING_LEVEL_SCHEMA:WARN}
logging.level.org.hibernate.engine.jdbc.env.internal.LobCreatorBuilderImpl=${LOGGING_LEVEL_LOB_CREATOR:WARN}

# Error Response Configuration
server.error.include-stacktrace=${SERVER_ERROR_INCLUDE_STACKTRACE:never}
server.error.include-message=${SERVER_ERROR_INCLUDE_MESSAGE:never}
server.error.include-binding-errors=${SERVER_ERROR_INCLUDE_BINDING_ERRORS:never}

# Spring Mail
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}

# Kafka Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS}
spring.kafka.producer.key-serializer=${KAFKA_KEY_SERIALIZER}
spring.kafka.producer.value-serializer=${KAFKA_VALUE_SERIALIZER}
spring.kafka.producer.properties.spring.json.add.type.headers=${KAFKA_ADD_TYPE_HEADERS}
spring.kafka.properties.security.protocol=${KAFKA_SECURITY_PROTOCOL}
spring.kafka.properties.sasl.mechanism=${KAFKA_SASL_MECHANISM}
spring.kafka.properties.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required username="${KAFKA_SASL_USERNAME}" password="${KAFKA_SASL_PASSWORD}";
spring.kafka.properties.ssl.endpoint.identification.algorithm=
spring.kafka.ssl.trust-store-type=${KAFKA_SSL_TRUSTSTORE_TYPE}
spring.kafka.ssl.trust-store-location=${KAFKA_SSL_TRUSTSTORE_LOCATION}
spring.kafka.ssl.trust-store-password=${KAFKA_SSL_TRUSTSTORE_PASSWORD}
kafka.sasl.username=${KAFKA_SASL_USERNAME}
kafka.sasl.password=${KAFKA_SASL_PASSWORD}
kafka.consumer.group-id=${KAFKA_CONSUMER_GROUP_ID}
kafka.consumer.trusted-packages=${KAFKA_CONSUMER_TRUSTED_PACKAGES}
kafka.topic.appointment=${KAFKA_TOPIC_APPOINTMENT}
kafka.topic.notification=${KAFKA_TOPIC_NOTIFICATION}
kafka.topic.cloudflows=${KAFKA_TOPIC_CLOUDFLOWS}
kafka.topic.partitions=${KAFKA_TOPIC_PARTITIONS}
kafka.topic.replicas=${KAFKA_TOPIC_REPLICAS}

# JWT Configuration
jwt.secret.key=${JWT_SECRET_KEY:your-secret-key-min-256-bits-long-for-production-use-only}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Application URLs
app.base-url=${APP_BASE_URL:http://localhost:9000}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}

# File Upload Configuration
file.upload-dir=${FILE_UPLOAD_DIR:./uploads}

# Payment Gateway Configuration
stripe.api.key=${STRIPE_API_KEY:}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET:}
razorpay.key.id=${RAZORPAY_KEY_ID:}
razorpay.key.secret=${RAZORPAY_KEY_SECRET:}
