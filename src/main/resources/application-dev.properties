spring.application.name=cloudflows
server.port=9000
application.environment=development

# Database Configuration
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.currentSchema=${DB_SCHEMA}
spring.datasource.driver-class-name=org.postgresql.Driver

# Disable Hibernate connection pool logging
logging.level.org.hibernate.orm.connections.pooling=WARN
logging.level.org.hibernate.engine.jdbc.connections.internal=WARN
logging.level.org.hibernate=WARN

# Hibernate/JPA Properties
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# Spring Mail
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Kafka Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# JWT Configuration
jwt.secret.key=${JWT_SECRET_KEY:your-secret-key-min-256-bits-long-for-production-use-only}

# Application URLs
app.base-url=${APP_BASE_URL:http://localhost:9000}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}

# File Upload Configuration
file.upload-dir=${FILE_UPLOAD_DIR:./uploads}
