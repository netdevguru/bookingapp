spring.application.name=cloudflows
server.port=9000
application.environment=development

# Database Configuration
spring.datasource.url=${DB_URL}?sslmode=require
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate default schema
spring.jpa.properties.hibernate.default_schema=public

# Disable Hibernate connection pool logging
logging.level.org.hibernate.orm.connections.pooling=WARN
logging.level.org.hibernate.engine.jdbc.connections.internal=WARN

# Hibernate/JPA Properties
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata
spring.jpa.properties.hibernate.default_schema=public

# Enable Hibernate DDL logging
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.tool.schema=DEBUG
logging.level.org.hibernate.engine.jdbc.env.internal.LobCreatorBuilderImpl=WARN

# Spring Mail
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Kafka Configuration
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.producer.properties.spring.json.add.type.headers=false

# JWT Configuration
jwt.secret.key=${JWT_SECRET_KEY:your-secret-key-min-256-bits-long-for-production-use-only}

# CORS Configuration
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

# Application URLs
app.base-url=${APP_BASE_URL:http://localhost:9000}
app.frontend-url=${APP_FRONTEND_URL:http://localhost:3000}

# File Upload Configuration
file.upload-dir=${FILE_UPLOAD_DIR:./uploads}
